<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="گالری دیجیتال آثار تاریخی و باستانی ایران — سفری به دل تمدن هزاران ساله">
  <title>گالری میراث باستانی ایران</title>

  <!-- Vazirmatn: A modern, open-source Persian/Arabic typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== Site Header ===== -->
  <header role="banner">
    <p class="header-eyebrow">میراث جهانی</p>
    <h1>گالری میراث باستانی ایران</h1>
    <p class="header-subtitle">سفری به اعماق تاریخ و تمدن ایران زمین</p>
    <div class="header-rule"></div>
  </header>

  <!-- ===== Gallery Grid (cards injected by script.js) ===== -->
  <main>
    <div class="gallery-grid" id="gallery-grid" role="list" aria-label="آثار تاریخی ایران"></div>
  </main>

  <!-- ===== Footer ===== -->
  <footer role="contentinfo">
    <p>تصاویر از <a href="https://commons.wikimedia.org/" target="_blank" rel="noopener noreferrer">ویکی‌مدیا کامنز</a> با مجوز عمومی — محتوا بر اساس منابع تاریخی معتبر</p>
  </footer>

  <!-- ===== Lightbox / Modal ===== -->
  <div
    class="modal-overlay"
    id="modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
    aria-hidden="true"
  >
    <div class="modal-content" id="modal-content">
      <!-- Close button — positioned in top-start corner (right in RTL) -->
      <button class="modal-close" id="modal-close" aria-label="بستن پنجره">&#x2715;</button>

      <div class="modal-image-wrap">
        <img id="modal-image" src="" alt="">
      </div>

      <div class="modal-text">
        <p class="modal-eyebrow">میراث تاریخی ایران</p>
        <h2 id="modal-title"></h2>
        <div class="modal-divider"></div>
        <p id="modal-description"></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
